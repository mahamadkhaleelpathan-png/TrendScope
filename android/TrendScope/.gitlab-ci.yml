image: gradle:8.7-jdk17

stages:
  - build

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  paths:
    - .gradle/
    - android/TrendScope/.gradle/

build_apk:
  stage: build
  script:
    - cd android/TrendScope
    - chmod +x gradlew || true
    - ./gradlew assembleDebug
  artifacts:
    paths:
      - android/TrendScope/app/build/outputs/apk/debug/app-debug.apk
    expire_in: 30 days