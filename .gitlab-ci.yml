stages:
  - build
  - release

build_apk:
  stage: build
  tags:
    - android

  script:
    - powershell -ExecutionPolicy Bypass -File scripts/update-version.ps1
    - cd android/TrendScope
    - Set-Content -Path local.properties -Value "sdk.dir=C:\\Users\\Khaleel Pathan\\AppData\\Local\\Android\\Sdk"
    - .\gradlew.bat assembleRelease
    - cd ..\..
    - New-Item -ItemType Directory -Force -Path "apk"
    - Copy-Item "android\TrendScope\app\build\outputs\apk\release\app-release.apk" "apk\TrendScope.apk" -Force

  artifacts:
    paths:
      - apk/TrendScope.apk
      - android/TrendScope/app/build.gradle.kts
    expire_in: 7 days

release_github:
  stage: release
  tags:
    - android

  needs:
    - build_apk

  script:
    - |
      $version = (Select-String -Path "android/TrendScope/app/build.gradle.kts" -Pattern 'versionName = "(.*)"').Matches.Groups[1].Value

      $headers = @{
        Authorization = "token $env:GITHUB_TOKEN"
        Accept = "application/vnd.github+json"
      }

      try {
        $release = Invoke-RestMethod `
          -Headers $headers `
          -Uri "https://api.github.com/repos/$env:GITHUB_USERNAME/$env:GITHUB_REPOSITORY/releases/tags/v$version" `
          -Method Get
      }
      catch {
        $release = Invoke-RestMethod `
          -Headers $headers `
          -Uri "https://api.github.com/repos/$env:GITHUB_USERNAME/$env:GITHUB_REPOSITORY/releases" `
          -Method Post `
          -Body (@{
            tag_name = "v$version"
            name = "TrendScope v$version"
            generate_release_notes = $true
          } | ConvertTo-Json)
      }

      $uploadUrl = $release.upload_url.Replace("{?name,label}","")

      Invoke-RestMethod `
        -Headers @{
          Authorization = "token $env:GITHUB_TOKEN"
          Accept = "application/vnd.github+json"
          "Content-Type" = "application/vnd.android.package-archive"
        } `
        -Uri "$uploadUrl?name=TrendScope.apk" `
        -Method Post `
        -InFile "apk/TrendScope.apk"