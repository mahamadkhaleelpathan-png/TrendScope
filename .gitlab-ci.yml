stages:
  - build

build_apk:
  stage: build
  tags:
    - android

 script:
  - cd android/TrendScope
  - Set-Content -Path local.properties -Value "sdk.dir=C:\\Users\\Khaleel Pathan\\AppData\\Local\\Android\\Sdk"

  - Write-Host "Building APK..."
  - .\gradlew.bat assembleRelease

  - Write-Host "Returning to project root..."
  - cd ..\..

  - Write-Host "Creating apk folder..."
  - New-Item -ItemType Directory -Force -Path "apk"

  - Write-Host "Copying APK..."
  - Copy-Item "android\TrendScope\app\build\outputs\apk\release\app-release.apk" "apk\app-release.apk" -Force

  - Write-Host "Configuring Git..."
  - git config user.name "GitLab CI"
  - git config user.email "ci@gitlab.local"

  - Write-Host "Git Status..."
  - git status

  - git add apk/app-release.apk

  - Write-Host "Cached Changes..."
  - git diff --cached
  artifacts:
    paths:
      - apk/app-release.apk
    expire_in: 7 days