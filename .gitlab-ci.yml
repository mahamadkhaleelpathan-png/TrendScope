stages:
  - build

build_apk:
  stage: build
  tags:
    - android

  script:
    - echo "=== Current Directory ==="
    - Get-Location

    - echo "=== Java Version ==="
    - java -version

    - echo "=== Gradle Version ==="
    - cd android/TrendScope
    - .\gradlew.bat --version

    - echo "=== Android SDK ==="
    - echo $env:ANDROID_HOME

    - Set-Content -Path local.properties -Value "sdk.dir=C:\\Users\\Khaleel Pathan\\AppData\\Local\\Android\\Sdk"

    - echo "=== local.properties ==="
    - Get-Content local.properties

    - .\gradlew.bat assembleRelease --stacktrace

  artifacts:
    when: always
    paths:
      - android/TrendScope/app/build/outputs/apk/release/
    expire_in: 7 days